name: Build
on:
  push:
    branches:
      - master
      - branch-*
      - dogfood-*
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * 1-5"  # Run Mon-Fri at 01:30 AM UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: github-ubuntu-latest-s
    name: Build
    permissions:
      id-token: write  # Required for Vault OIDC authentication
      contents: write  # Required for repository access and tagging
    outputs:
      build-number: ${{ steps.build-step.outputs.BUILD_NUMBER }}
      deployed: ${{ steps.build-step.outputs.deployed }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2025.7.12
      - name: Select Java 21
        run: mise use java@21
      - uses: SonarSource/ci-github-actions/build-gradle@v1
        id: build-step
        with:
          deploy-pull-request: true
          artifactory-reader-role: private-reader
          artifactory-deployer-role: qa-deployer

  build-qa-windows:
    name: Build and QA Windows
    needs: build
    runs-on: github-windows-latest-m
    permissions:
      id-token: write  # Required for Vault OIDC authentication
      contents: write  # Required for repository access and tagging
    env:
      BUILD_NUMBER: ${{ needs.build.outputs.build-number }}
      SQ_VERSION: 'LATEST_RELEASE[2025.4]'
    steps:
      - name: Config Git
        run: git config --global core.autocrlf input
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2025.7.12
      - name: Select Java 21
        run: mise use java@21
      - name: Get GitHub Token for QA Licenses
        id: secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/github/token/licenses-ro token | GITHUB_TOKEN;
      - name: Configure Gradle
        uses: SonarSource/ci-github-actions/config-gradle@v1
        with:
          artifactory-reader-role: private-reader
      - name: Orchestrator Cache
        uses: ./.github/actions/orchestrator-cache
        with:
          sq-version: ${{ env.SQ_VERSION }}
      - name: Build
        env:
          GITHUB_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).GITHUB_TOKEN }}
        shell: bash
        run: |
          ./gradlew "-Dsonar.runtimeVersion=$SQ_VERSION" -DbuildNumber=$BUILD_NUMBER --no-daemon --console plain --info --stacktrace build test -PintegrationTests=true

  qa:
    needs: [build]
    if: ${{ needs.build.outputs.deployed }}
    runs-on: github-ubuntu-latest-m
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        sq-version:
          - "LATEST_RELEASE[2025.1]"
          - "LATEST_RELEASE[2025.4]"
          - "DEV"
        is_nightly:
          - ${{ github.event_name == 'schedule' }}
        exclude:
          # DEV is tested only in nightly to reduce Repox usage
          - sq-version: "DEV"
            is_nightly: false
    name: "QA Tests - SQ : ${{ matrix.sq-version }}"
    env:
      BUILD_NUMBER: ${{ needs.build.outputs.build-number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2025.7.12
      - name: Select Java 21
        run: mise use java@21
      - name: Get GitHub Token for QA Licenses
        id: secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/github/token/licenses-ro token | GITHUB_TOKEN;
      - name: Configure Gradle
        uses: SonarSource/ci-github-actions/config-gradle@v1
        with:
          artifactory-reader-role: private-reader
      - name: Orchestrator Cache
        uses: ./.github/actions/orchestrator-cache
        with:
          sq-version: ${{ matrix.sq-version }}
      - name: Run QA Tests
        shell: bash
        env:
          SQ_VERSION: ${{ matrix.sq-version }}
          GITHUB_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).GITHUB_TOKEN }}
        run: >-
          ./gradlew -DbuildNumber=$BUILD_NUMBER
          -PintegrationTests=true
          -Dsonar.runtimeVersion=$SQ_VERSION
          -Dorchestrator.artifactory.accessToken=$ARTIFACTORY_ACCESS_TOKEN
          --console plain --no-daemon --info
          build test

  promote:
    needs: [build, build-qa-windows, qa]
    if: ${{ needs.build.outputs.deployed }}
    runs-on: github-ubuntu-latest-s
    name: Promote
    permissions:
      id-token: write
      contents: write
    env:
      BUILD_NUMBER: ${{ needs.build.outputs.build-number }}
    steps:
      - uses: SonarSource/ci-github-actions/promote@v1
        with:
          promote-pull-request: true
